name: Docker image (release)

on:
  release:
    types: [published]   # срабатывает при публикации релиза (кнопка Publish) :contentReference[oaicite:2]{index=2}
  workflow_dispatch:     # опционально: ручной запуск из Actions

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jacred
          # теги из релизного тега (semver), плюс sha
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # latest только для НЕ prerelease
      - name: Tag latest (stable only)
        if: ${{ github.event.release.prerelease == false }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/jacred:latest \
            $(echo "${{ steps.meta.outputs.tags }}" | head -n 1)

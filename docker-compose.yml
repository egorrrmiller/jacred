name: jacrett

services:
  jacrett:
    image: ${IMAGE_NAME:-ghcr.io/egorrrmiller/jacrett:latest}
    container_name: jacrett
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      UMASK: ${UMASK:-0027}
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-9117}
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION:-Host=db;Port=${DB_PORT:-5432};Database=${DB_NAME:-jacrett};Username=${DB_USER:-jacrett};Password=${DB_PASSWORD:-jacrett};Timeout=30;CommandTimeout=60;}
    ports:
      - "${APP_PORT:-9117}:${APP_PORT:-9117}"
    volumes:
      - ${CONFIG_PATH:-./config.yml}:/app/config.local.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1:${HEALTHCHECK_PORT:-9117}"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s

  db:
    image: postgres:16-alpine
    container_name: jacrett-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jacrett}
      POSTGRES_USER: ${DB_USER:-jacrett}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jacrett}
    expose:
      - "5432"
    # Раскомментируйте для доступа к БД снаружи
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    volumes:
      - jacrett-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jacrett} -d ${DB_NAME:-jacrett}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  jacrett-db:

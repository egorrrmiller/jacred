##### настройка сервера
listen-ip: any
listen-port: 9117
api-key: 'key'
web: true

##### настройка выдачи

# если у раздач одинаковый infohash, считаем это один торрент; объединяем их метаданные (сид/личи, размеры, названия, ссылки) в одну итоговую запись.
merge-duplicates: true

# дополнительно схлопывает те же дубликаты, когда отличаются лишь номер/суффикс в названии (Release, Release (1), Release-2), если infohash совпадает; метаданные так же объединяются.
# работает для сериалов/аниме и похожего контента
merge-num-duplicates: true

##### настройка трекеров

# настройки категорий трекеров для синхронизации
trackers-categories:
  # список категорий рутрекера, с которых будут синхронизироваться самые популярные торренты по сидам
  # список категорий в ....
  rutracker:
    - 111
    - 222
    - 333

# список трекеров для синхронизации актуальности раздач, категорий
sync-trackers:
  - rutracker
  - aniliberty

# трекеры, результаты которых будут удалены из ответа
disable-trackers:
  - rutracker

rutracker:
  authorization:
    login: ''
    password: ''